<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>New Lead Intake | Real Estate SaaS</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Premium Luxury Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Montserrat:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Playfair Display', 'serif'],
            heading: ['Montserrat', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              600: '#0284c7',
              700: '#0369a1',
              800: '#075985',
            }
          }
        }
      }
    }
  </script>
<style data-purpose="custom-styling">
    body {
      background-color: #f8fafc; /* Light gray/off-white background */
    }
    /* Smooth transition for input focus */
    input, select, textarea {
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

.intake-header {
    background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
    padding: 40px 24px;
    border-radius: 14px;
    text-align: center;
    margin-bottom: 20px;
    border: none;
    box-shadow: 0 8px 24px rgba(26, 58, 82, 0.2);
}

.intake-header h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0;
    color: #ffffff;
    letter-spacing: -0.5px;
}

.intake-header p {
    margin-top: 8px;
    font-size: 14px;
    color: #e2e8f0;
    font-weight: 500;
}

</style>
</head>
<body class="min-h-screen p-4 md:p-8 bg-gray-100">

 <div class="navbar-index">

    <div class="nav-top">
        <span class="logo">Hoomworth CRM</span>

        <div class="menu-toggle" onclick="toggleMenu()">
            ☰
        </div>
    </div>

    <div class="nav-menu" id="navMenu">
        <a href="{{ url_for('index') }}">Dashboard</a>
        <a href="{{ url_for('leads') }}">Leads</a>
        <a href="{{ url_for('prospect') }}">Prospect</a>
        <a href="{{ url_for('insights') }}">Insights</a>
        <a href="{{ url_for('profile') }}">My Account</a>
        {% if current_user and current_user.is_admin %}
        <a href="{{ url_for('admin') }}" style="color: #f59e0b;">Admin</a>
        {% endif %}
        <a href="{{ url_for('logout') }}" class="logout">Logout</a>
    </div>

</div>

 <div style="max-width:1100px; margin:0 auto 20px;">

<!-- BEGIN: MainContainer -->
<main class="w-full max-w-2xl mx-auto mt-6" data-purpose="form-wrapper">
<!-- BEGIN: IntakeCard -->
<div class="bg-white rounded-xl overflow-hidden sm:grid-cols-3" style="box-shadow: 0 10px 30px rgba(0,0,0,0.08); border: 1px solid #e5e7eb;">
<!-- BEGIN: FormHeader -->

<div class="intake-header">
  <h1>New Lead Intake</h1>
  <p>
    Capture prospect details to generate follow-up messages and track your pipeline.
  </p>
</div>

<!-- END: FormHeader -->
<!-- BEGIN: IntakeForm -->
<form action="/add_lead" method="POST" class="p-8 space-y-7" data-purpose="lead-capture-form">
<!-- Grid Container for paired fields -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Agent Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="agent_name" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Agent Name</label>
<input class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm" id="agent_name" name="agent_name" placeholder="e.g. Chinedu Okafor" required="" type="text" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;"/>
</div>
<!-- Lead Name -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="name" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Lead Name</label>
<input class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm" id="name" name="name" placeholder="e.g. Adebiyi Daniel" required="" type="text" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;"/>
</div>
<!-- WhatsApp Phone -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="phone" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">WhatsApp Phone</label>
<div class="relative">
<input class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm" id="phone" name="phone" placeholder="e.g. 0801 234 5678" required="" type="tel" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;"/>
</div>
</div>
<!-- Budget -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="budget" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Budget Range</label>
<select class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm font-normal text-slate-500" id="budget" name="budget" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;"><option value="">Select budget...</option>
<option value="50k-100k">₦50k - ₦100k</option>
<option value="100k-500k">₦100k - ₦500k</option>
<option value="1m-5m">₦1m - ₦5m</option>
<option value="5m-10m">₦5m - ₦10m</option>
<option value="10m-50m">₦10m - ₦50m</option>
<option value="50m-100m">₦50m - ₦100m</option></select>
</div>
<!-- Desired Location -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="location" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Desired Location</label>
<input class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm" id="location" name="location" placeholder="e.g. Lekki Phase 1, Ikoyi, or Victoria Island" type="text" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;"/>
</div>
<!-- Property Type -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="property_type" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Property Type</label>
<select class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm" id="property_type" name="property_type" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;">
<option value="self-contain">Self-Contain</option>
<option value="mini-flat">Mini Flat</option>
<option value="apartment-flat">Apartment / Flat</option>
<option value="duplex">Duplex</option>
<option value="terraced-house">Terraced House</option>
<option value="bungalow">Bungalow</option>
<option value="land">Land</option>
</select>
</div>
</div>
<!-- Timeline (Full Width) -->
<div class="flex flex-col gap-1.5 sm:grid-cols-3">
<label class="text-sm font-semibold text-slate-700" for="timeline" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Expected Timeline</label>
<div class="grid grid-cols-2 gap-3 sm:grid-cols-5">
<!-- Timeline Radio Options -->
<label class="relative flex items-center justify-center rounded-lg border border-slate-200 p-3 cursor-pointer hover:bg-slate-50 focus-within:ring-2 focus-within:ring-brand-600" style="">
<input class="sr-only" name="timeline" type="radio" value="immediate" required>
<span class="text-xs font-medium text-slate-600" style="font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px;">Immediate</span>
</label>
<label class="relative flex items-center justify-center rounded-lg border border-slate-200 p-3 cursor-pointer hover:bg-slate-50 focus-within:ring-2 focus-within:ring-brand-600" style="">
<input class="sr-only" name="timeline" type="radio" value="1-3-months"/>
<span class="text-xs font-medium text-slate-600" style="font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px;">1-3 Months</span>
</label>
<label class="relative flex items-center justify-center rounded-lg border border-slate-200 p-3 cursor-pointer hover:bg-slate-50 focus-within:ring-2 focus-within:ring-brand-600" style="">
<input class="sr-only" name="timeline" type="radio" value="3-6-months"/>
<span class="text-xs font-medium text-slate-600" style="font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px;">3-6 Months</span>
</label>
<label class="relative flex items-center justify-center rounded-lg border border-slate-200 p-3 cursor-pointer hover:bg-slate-50 focus-within:ring-2 focus-within:ring-brand-600" style="">
<input class="sr-only" name="timeline" type="radio" value="6-12-months"/>
<span class="text-xs font-medium text-slate-600" style="font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px;">6-12 Months</span>
</label>
<label class="relative flex items-center justify-center rounded-lg border border-slate-200 p-3 cursor-pointer hover:bg-slate-50 focus-within:ring-2 focus-within:ring-brand-600" style="">
<input class="sr-only" name="timeline" type="radio" value="12-24-months"/>
<span class="text-xs font-medium text-slate-600" style="font-family: 'Montserrat', sans-serif; letter-spacing: 0.3px;">12-24 Months</span>
</label>
</div>
<!-- Lead Source -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="source" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Lead Source</label>
<select class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm font-normal text-slate-500" id="source" name="source" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;">
<option value="Manual Entry">Manual Entry</option>
<option value="Instagram">Instagram</option>
<option value="Facebook">Facebook</option>
<option value="Referral">Referral</option>
<option value="Website">Website / Landing Page</option>
<option value="Other">Other</option>
</select>
</div>
</div>
<!-- Additional Notes -->
<div class="flex flex-col gap-1.5">
<label class="text-sm font-semibold text-slate-700" for="notes" style="font-family: 'Montserrat', sans-serif; font-size: 13px; letter-spacing: 0.3px; color: #1a3a52; text-transform: uppercase;">Additional Notes</label>
<textarea class="block w-full rounded-lg border-slate-300 shadow-sm focus:border-brand-600 focus:ring-brand-600 sm:text-sm" id="notes" name="notes" placeholder="Specific features required, preferred communication times..." rows="3" style="font-family: 'Inter', sans-serif; letter-spacing: 0.2px;"></textarea>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button type="submit" style="background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%); box-shadow: 0 8px 24px rgba(26, 58, 82, 0.2);" class="w-full text-white py-3 rounded-lg font-semibold text-sm hover:opacity-90 transition-opacity">
    Save Lead & Generate Message
</button>
</div>
</form>

<!-- END: IntakeForm -->
<!-- BEGIN: FormFooter -->
<footer style="background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%); box-shadow: 0 8px 24px rgba(26, 58, 82, 0.2);" class="px-8 py-6 border-t flex justify-center">
<a class="text-sm font-medium text-white hover:text-slate-200 flex items-center gap-1 transition-colors" href="{{ url_for('leads') }}" style="">
<svg class="h-4 w-4" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M4 6h16M4 10h16M4 14h16M4 18h16" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
          View All Leads
        </a>
</footer>
<!-- END: FormFooter -->
</div>
<!-- END: IntakeCard -->
</main>
<!-- END: MainContainer -->
<script data-purpose="radio-button-visual-feedback">
    // Small script to handle visual feedback for the custom radio buttons
    const radioLabels = document.querySelectorAll('input[name="timeline"]');
    radioLabels.forEach(radio => {
      radio.addEventListener('change', (e) => {
        // Reset all
        document.querySelectorAll('input[name="timeline"]').forEach(el => {
          el.parentElement.classList.remove('border-brand-600', 'bg-brand-50', 'ring-2', 'ring-brand-600');
          el.parentElement.querySelector('span').classList.replace('text-brand-700', 'text-slate-600');
        });
        // Set active
        if (e.target.checked) {
          e.target.parentElement.classList.add('border-brand-600', 'bg-brand-50', 'ring-2', 'ring-brand-600');
          e.target.parentElement.querySelector('span').classList.replace('text-slate-600', 'text-brand-700');
        }
      });
    });
  </script>

  <script>
    function toggleMenu() {
        const menu = document.getElementById("navMenu");
        menu.classList.toggle("show");
        }
 </script>
</body></html>
