<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Lagos Lead Intake</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen flex items-center justify-center p-4" style="background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);">
  <div class="w-full max-w-md bg-white rounded-xl shadow-xl p-8">
    <h1 class="text-3xl font-bold text-center mb-2">Create Account</h1>
    <p class="text-center text-gray-500 mb-6">Register as a realtor</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded-lg {% if category == 'error' %}bg-red-100 text-red-700{% else %}bg-green-100 text-green-700{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form action="{{ url_for('register') }}" method="POST" class="space-y-4">
      <div>
        <label class="block text-sm font-semibold mb-1">Full Name</label>
        <input type="text" name="full_name" required class="w-full rounded-lg border border-gray-300 px-4 py-3">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1">Email</label>
        <input type="email" name="email" required class="w-full rounded-lg border border-gray-300 px-4 py-3">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1">Password</label>
        <input type="password" name="password" required class="w-full rounded-lg border border-gray-300 px-4 py-3">
      </div>

      <div>
        <label class="block text-sm font-semibold mb-1">Confirm Password</label>
        <input type="password" name="confirm_password" required class="w-full rounded-lg border border-gray-300 px-4 py-3">
      </div>

      <button type="submit" class="w-full py-3 rounded-lg text-white font-semibold" style="background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%); box-shadow: 0 4px 12px rgba(26, 58, 82, 0.2);">
        Create Account
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
      Already have an account?
      <a href="{{ url_for('login') }}" class="text-blue-600 font-semibold">Log in</a>
    </p>
  </div>
</body>
</html>
